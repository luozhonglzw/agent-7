# ═══════════════════════════════════════════════════════════════
# RAG Knowledge Base System - Production Docker Compose
# ═══════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    networks:
      - rag-network

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rag-network

  # ── Qdrant Vector Database ───────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    networks:
      - rag-network

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: rag-backend
    restart: always
    env_file:
      - .env
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
      replicas: 2
    networks:
      - rag-network

  # ── Celery Worker ────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: rag-celery-worker
    restart: always
    env_file:
      - .env
    command: celery -A app.celery_app worker --loglevel=warning --concurrency=8 -Q documents,embeddings,default
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    networks:
      - rag-network

  # ── Celery Beat (Scheduler) ──────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: rag-celery-beat
    restart: always
    env_file:
      - .env
    command: celery -A app.celery_app beat --loglevel=warning
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag-network

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: rag-frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    networks:
      - rag-network

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - rag-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  upload_data:

networks:
  rag-network:
    driver: bridge
